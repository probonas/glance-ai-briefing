services:
  briefing:
    build: .
    ports:
      - "8090:8080"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-deepseek}
      - LLM_API_KEY=${LLM_API_KEY}
      - GLANCE_CONFIG=/glance-config/config/home.yml
    volumes:
      - ${GLANCE_CONFIG_DIR:-~/glance-config}:/glance-config:ro
    restart: unless-stopped
